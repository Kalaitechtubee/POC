<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRO Monitor — Live Subtitles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700;800&family=Noto+Sans+Tamil:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #000000;
      --surface:   #0d0d0d;
      --border:    #1e1e1e;
      --text:      #ffffff;
      --dim:       #444444;
      --muted:     #888888;
      --live:      #00D4FF;
      --live-dim:  rgba(0, 212, 255, 0.12);
      --final:     #ffffff;
      --trans:     #aaaaaa;
      --online:    #44ff88;
      --warn:      #ffcc44;
      --danger:    #ff4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── HEADER ──────────────────────────────────────────── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--online);
      border: 1px solid rgba(68,255,136,0.3);
      border-radius: 20px;
      padding: 3px 9px;
    }

    .live-dot {
      width: 5px; height: 5px;
      background: var(--online);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(0.6); }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Language Select ─────────────────────────────────── */
    .custom-select {
      position: relative;
      width: 160px;
      user-select: none;
    }

    .select-trigger {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }
    .select-trigger:hover { border-color: #444; }
    .select-trigger::after {
      content: '▾';
      font-size: 11px;
      opacity: 0.5;
    }

    .select-options {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: none;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
      z-index: 200;
    }
    .select-options.show { display: block; }

    .option {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .option:hover  { background: #1a1a1a; color: #fff; }
    .option.active { color: #fff; background: #161616; }

    /* ── Reset Button ────────────────────────────────────── */
    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

    /* ── COLUMN LABELS ───────────────────────────────────── */
    .col-labels {
      position: fixed;
      top: 56px; left: 0; right: 0;
      height: 36px;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 90;
    }

    .col-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 32px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .col-label.right { justify-content: flex-end; }

    .col-pip {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--live);
    }
    .col-pip.tl { background: var(--trans); }

    .col-divider { background: var(--border); }

    /* ── MAIN PANELS ─────────────────────────────────────── */
    .panels {
      position: fixed;
      top: 92px;       /* header 56 + labels 36 */
      bottom: 48px;    /* footer */
      left: 0; right: 0;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
    }

    .panel {
      overflow-y: auto;
      overflow-x: hidden;
      padding: 32px 40px 120px;
      scroll-behavior: smooth;
    }

    /* Hide scrollbar visually but keep it functional */
    .panel::-webkit-scrollbar { width: 3px; }
    .panel::-webkit-scrollbar-track { background: transparent; }
    .panel::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 2px;
    }
    .panel::-webkit-scrollbar-thumb:hover { background: #444; }

    .panel-divider { background: var(--border); }

    /* ── TEXT ────────────────────────────────────────────── */
    .segment {
      margin-bottom: 6px;
    }

    /* finalized sentence */
    .sentence {
      font-size: clamp(18px, 1.7vw, 24px);
      font-weight: 600;
      line-height: 1.85;
      color: var(--final);
      display: inline;
    }

    .sentence::after {
      content: ' ';
    }

    .sentence.latest {
      color: var(--live) !important;
      text-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
      transition: color 0.3s ease;
    }

    /* Word-by-word cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--live);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s steps(2) infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .para-break {
      display: block;
      height: 24px;
      margin-bottom: 8px;
    }

    /* right panel: Tamil/regional */
    .panel.right .sentence {
      font-family: 'Noto Sans Tamil', 'Inter', sans-serif;
      font-weight: 400;
      font-size: clamp(16px, 1.6vw, 22px);
      line-height: 2.1;
      color: var(--trans);
    }

    /* live/partial word stream */
    .partial-line {
      font-size: clamp(18px, 1.7vw, 24px);
      font-weight: 700;
      line-height: 1.85;
      color: var(--live);
      display: inline;
    }

    .panel.right .partial-line {
      font-family: 'Noto Sans Tamil', 'Inter', sans-serif;
      font-size: clamp(16px, 1.6vw, 22px);
      line-height: 2.1;
      color: rgba(0, 212, 255, 0.7);
    }

    /* blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      margin-left: 2px;
      vertical-align: text-bottom;
    }

    .cursor::after {
      content: "|";
      color: var(--live);
      font-weight: 700;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* paragraph break marker */
    .para-break {
      display: block;
      height: 28px;
    }

    /* session restart marker */
    .session-mark {
      display: block;
      margin: 20px 0 16px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* awaiting state */
    .await-hint {
      color: var(--dim);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 40px;
      text-align: center;
    }

    /* ── SCROLL-TO-BOTTOM BUTTONS ────────────────────────── */
    .scroll-btn {
      position: fixed;
      bottom: 60px;
      background: #111;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 80;
    }
    .scroll-btn.visible { opacity: 1; pointer-events: all; }
    .scroll-btn:hover { border-color: var(--live); color: var(--live); }
    #scrollBtnLeft  { left: 22%; }
    #scrollBtnRight { right: 22%; }

    /* ── FOOTER ──────────────────────────────────────────── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
    }

    #status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.3s;
    }
    #status-dot.online  { background: var(--online); box-shadow: 0 0 6px var(--online); }
    #status-dot.warn    { background: var(--warn); }
    #status-dot.offline { background: var(--danger); }

    .word-count {
      font-family: 'Outfit', monospace;
      font-size: 10px;
      color: var(--dim);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="brand">LiveScript Pro</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="header-right">
    <div class="custom-select">
      <div class="select-trigger" id="lang-trigger">
        <span id="selected-lang">TAMIL</span>
      </div>
      <div class="select-options" id="lang-options">
        <div class="option active" data-value="ta">TAMIL</div>
        <div class="option" data-value="te">TELUGU</div>
        <div class="option" data-value="kn">KANNADA</div>
        <div class="option" data-value="ml">MALAYALAM</div>
        <div class="option" data-value="hi">HINDI</div>
      </div>
    </div>
    <button class="btn-reset" id="btn-reset">↺ Reset</button>
  </div>
</div>

<!-- COLUMN LABELS -->
<div class="col-labels">
  <div class="col-label">
    <div class="col-pip"></div>
    English — Source
  </div>
  <div class="col-divider"></div>
  <div class="col-label right">
    Translation — Target
    <div class="col-pip tl"></div>
  </div>
</div>

<!-- PANELS -->
<div class="panels">
  <div class="panel left" id="panelLeft">
    <p class="await-hint" id="awaitLeft">Awaiting speech…</p>
  </div>

  <div class="panel-divider"></div>

  <div class="panel right" id="panelRight">
    <p class="await-hint" id="awaitRight">Translation will appear here</p>
  </div>
</div>

<!-- SCROLL BUTTONS -->
<button class="scroll-btn" id="scrollBtnLeft"  onclick="jumpToBottom('left')">↓ Latest</button>
<button class="scroll-btn" id="scrollBtnRight" onclick="jumpToBottom('right')">↓ Latest</button>

<!-- FOOTER -->
<div class="footer">
  <div class="status-area">
    <div id="status-dot" class="online"></div>
    <span id="status-text">System Online</span>
  </div>
  <div class="word-count" id="word-count">0 words</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── DOM refs ──────────────────────────────────────────────
  const panelLeft    = document.getElementById('panelLeft');
  const panelRight   = document.getElementById('panelRight');
  const awaitLeft    = document.getElementById('awaitLeft');
  const awaitRight   = document.getElementById('awaitRight');
  const btnReset     = document.getElementById('btn-reset');
  const langTrigger  = document.getElementById('lang-trigger');
  const langOptions  = document.getElementById('lang-options');
  const selectedLang = document.getElementById('selected-lang');
  const wordCountEl  = document.getElementById('word-count');

  // ── State ─────────────────────────────────────────────────
  let enWordCount    = 0;
  let autoScrollLeft = true;
  let autoScrollRight= true;

  // Streaming Engine State
  let lastEnWordCount = 0;   
  let lastTlText      = "";  
  let activeEnSpan    = null; 
  let activeTlSpan    = null; 
  
  // Word Typing Queue (Smoothness)
  let wordQueue       = [];
  let typingTimer     = null;
  const TYPING_SPEED  = 80; // ms per word

  // Map for late translation updates (by ID)
  let sentenceSpans  = {};   // id -> { enSpan, tlSpan }

  // ── Helpers ───────────────────────────────────────────────
  function clean(text) {
    return (text || '').replace(/\s+/g, ' ').trim();
  }

  // Extract only the new words from a cumulative stream
  function getNewWords(current, previous) {
    current = clean(current);
    previous = clean(previous);
    if (!previous) return current;
    if (current.startsWith(previous)) {
      return current.slice(previous.length).trim();
    }
    // If stream drifted significantly, return the whole thing to avoid loss
    if (current.length < previous.length * 0.8) return current; 
    return ""; 
  }

  function hideAwaiting() {
    if (awaitLeft)  { awaitLeft.style.display  = 'none'; }
    if (awaitRight) { awaitRight.style.display = 'none'; }
  }

  function updateWordCount() {
    wordCountEl.textContent = enWordCount + ' words';
  }

  // ── Scroll tracking ───────────────────────────────────────
  function nearBottom(el) {
    return el.scrollHeight - el.scrollTop - el.clientHeight < 120;
  }

  panelLeft.addEventListener('scroll', () => {
    autoScrollLeft = nearBottom(panelLeft);
    document.getElementById('scrollBtnLeft')
      .classList.toggle('visible', !autoScrollLeft);
  });

  panelRight.addEventListener('scroll', () => {
    autoScrollRight = nearBottom(panelRight);
    document.getElementById('scrollBtnRight')
      .classList.toggle('visible', !autoScrollRight);
  });

  function scrollPanel(panel, auto) {
    if (!auto) return;
    panel.scrollTo({ top: panel.scrollHeight, behavior: 'smooth' });
  }

  function jumpToBottom(side) {
    if (side === 'left') {
      panelLeft.scrollTop = panelLeft.scrollHeight;
      autoScrollLeft = true;
      document.getElementById('scrollBtnLeft').classList.remove('visible');
    } else {
      panelRight.scrollTop = panelRight.scrollHeight;
      autoScrollRight = true;
      document.getElementById('scrollBtnRight').classList.remove('visible');
    }
  }

  // ── Streaming Engine ──────────────────────────────────────
  function handleStream(data) {
    hideAwaiting();
    
    const enText = clean(data.text);
    const tlText = data.translated ? clean(data.translated) : "";

    // 1. Process English (Word-By-Word Typing Queue)
    if (enText) {
      const words = enText.split(/\s+/);
      if (words.length > lastEnWordCount) {
        const newWords = words.slice(lastEnWordCount);
        wordQueue.push(...newWords);
        lastEnWordCount = words.length;
        startTypingLoop();
      }
    }

    // 2. Process Translation
    if (tlText) {
      if (!activeTlSpan) createNewActiveSpans();
      activeTlSpan.textContent = tlText;
      lastTlText = tlText;
    }

    scrollPanel(panelLeft,  autoScrollLeft);
    scrollPanel(panelRight, autoScrollRight);
  }

  function startTypingLoop() {
    if (typingTimer) return;
    
    typingTimer = setInterval(() => {
      if (wordQueue.length === 0) {
        clearInterval(typingTimer);
        typingTimer = null;
        return;
      }

      const word = wordQueue.shift();
      if (!activeEnSpan) createNewActiveSpans();
      
      const textNode = document.createTextNode((activeEnSpan.textContent.length > 2 ? " " : "") + word);
      activeEnSpan.insertBefore(textNode, activeEnSpan.querySelector('.cursor'));
      
      enWordCount++;
      updateWordCount();
      scrollPanel(panelLeft, autoScrollLeft);
    }, TYPING_SPEED);
  }

  function createNewActiveSpans() {
    // English
    activeEnSpan = document.createElement('span');
    activeEnSpan.className = 'sentence latest';
    const cur = document.createElement('span');
    cur.className = 'cursor';
    activeEnSpan.appendChild(cur);
    panelLeft.appendChild(activeEnSpan);

    // Translation
    activeTlSpan = document.createElement('span');
    activeTlSpan.className = 'sentence latest';
    panelRight.appendChild(activeTlSpan);

    // Paragraph breaks
    if (enWordCount > 0 && enWordCount % 40 < 5) {
      panelLeft.appendChild(document.createElement('span')).className = 'para-break';
      panelRight.appendChild(document.createElement('span')).className = 'para-break';
    }
  }

  function finalizeCurrent(data) {
    const id = data.id;
    const finalEn = clean(data.text);
    const finalTl = data.translated ? clean(data.translated) : "";

    // Fast-forward any words remaining in queue for this sentence
    while (wordQueue.length > 0) {
      const word = wordQueue.shift();
      if (!activeEnSpan) createNewActiveSpans();
      const textNode = document.createTextNode((activeEnSpan.textContent.length > 2 ? " " : "") + word);
      activeEnSpan.insertBefore(textNode, activeEnSpan.querySelector('.cursor'));
      enWordCount++;
    }
    clearInterval(typingTimer);
    typingTimer = null;

    if (!activeEnSpan) createNewActiveSpans();

    // Catch any final corrections (leftover words)
    const finalWords = finalEn.split(/\s+/);
    if (finalWords.length > lastEnWordCount) {
      const leftover = finalWords.slice(lastEnWordCount).join(' ');
      const textNode = document.createTextNode((activeEnSpan.textContent.length > 2 ? " " : "") + leftover);
      activeEnSpan.insertBefore(textNode, activeEnSpan.querySelector('.cursor'));
    }

    if (finalTl) activeTlSpan.textContent = finalTl;

    const cursor = activeEnSpan.querySelector('.cursor');
    if (cursor) cursor.remove();
    
    document.querySelectorAll('.sentence.latest').forEach(el => {
      if (el !== activeEnSpan && el !== activeTlSpan) el.classList.remove('latest');
    });

    sentenceSpans[id] = { enSpan: activeEnSpan, tlSpan: activeTlSpan };

    activeEnSpan = null;
    activeTlSpan = null;
    lastEnWordCount = 0;
    lastTlText = "";
    updateWordCount();

    scrollPanel(panelLeft,  autoScrollLeft);
    scrollPanel(panelRight, autoScrollRight);
  }

  function updateTranslation(id, tlText) {
    const entry = sentenceSpans[id];
    if (entry) {
      entry.tlSpan.textContent = clean(tlText);
      scrollPanel(panelRight, autoScrollRight);
    }
  }

  // ── Session restart marker ────────────────────────────────
  function addSessionMark() {
    const markL = document.createElement('span');
    markL.className = 'session-mark';
    markL.textContent = '— New Session —';
    const markR = document.createElement('span');
    markR.className = 'session-mark';
    markR.textContent = '— புதிய அமர்வு —';

    panelLeft.appendChild(markL);
    panelRight.appendChild(markR);
    
    // Reset engine state
    activeEnSpan = null;
    activeTlSpan = null;
    lastEnWordCount = 0;
    lastTlText = "";
  }

  // ── Load history ──────────────────────────────────────────
  function loadHistory(history) {
    panelLeft.innerHTML  = '';
    panelRight.innerHTML = '';
    sentenceSpans = {};
    enWordCount = 0;
    activeEnSpan = null;
    activeTlSpan = null;
    lastEnWordCount = 0;
    lastTlText = "";

    if (!history || history.length === 0) {
      createAwait(panelLeft,  'Awaiting speech…');
      createAwait(panelRight, 'Translation will appear here');
      return;
    }

    history.forEach(item => {
      // Create static spans for history
      const enSpan = document.createElement('span');
      enSpan.className = 'sentence';
      enSpan.textContent = clean(item.text);
      panelLeft.appendChild(enSpan);

      const tlSpan = document.createElement('span');
      tlSpan.className = 'sentence';
      tlSpan.textContent = item.translated ? clean(item.translated) : '…';
      panelRight.appendChild(tlSpan);

      sentenceSpans[item.id] = { enSpan, tlSpan };
      enWordCount += enSpan.textContent.split(' ').length;
    });

    updateWordCount();
    scrollPanel(panelLeft, true);
    scrollPanel(panelRight, true);
  }

  function createAwait(panel, msg) {
    const p = document.createElement('p');
    p.className = 'await-hint';
    p.textContent = msg;
    panel.insertBefore(p, panel.firstChild);
    return p;
  }

  // ── Reset ─────────────────────────────────────────────────
  function resetView() {
    panelLeft.innerHTML  = '';
    panelRight.innerHTML = '';
    sentenceSpans = {};
    enWordCount = 0;
    activeEnSpan = null;
    activeTlSpan = null;
    lastEnWordCount = 0;
    lastTlText = "";
    updateWordCount();
    socket.emit('clear_history');
  }

  // ── Socket.IO ─────────────────────────────────────────────
  const socket = io({ query: { type: 'web' } });

  socket.on('connect', () => {
    setStatus('online', 'System Online');
  });

  socket.on('disconnect', () => {
    setStatus('offline', 'Offline');
  });

  // Live partial words
  socket.on('live_subtitle', (data) => {
    handleStream(data);
  });

  // Finalized English sentence (translation may arrive later)
  socket.on('final_subtitle', (data) => {
    finalizeCurrent(data);
  });

  // Translation arrives separately (non-blocking from server)
  socket.on('translation_ready', (data) => {
    if (!data.id || !data.translated) return;
    updateTranslation(data.id, clean(data.translated));
  });

  // Full history on connect/reconnect
  socket.on('history', (history) => {
    loadHistory(history);
  });

  // Engine restarted
  socket.on('session_restart', () => {
    setStatus('warn', 'Reconnecting…');
    addSessionMark();
  });

  socket.on('engine_status', (data) => {
    if (data.status === 'ready' || data.status === 'streaming') {
      setStatus('online', 'System Online');
    } else if (data.status === 'error') {
      setStatus('offline', 'Engine Error');
    }
  });

  // Language change acknowledged
  socket.on('config_ack', (data) => {
    console.log('[CONFIG] Language confirmed:', data.target_lang);
  });

  // ── Status helper ─────────────────────────────────────────
  function setStatus(cls, text) {
    const dot  = document.getElementById('status-dot');
    const span = document.getElementById('status-text');
    dot.className  = cls;
    span.textContent = text;
  }

  // ── Language dropdown ─────────────────────────────────────
  langTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    langOptions.classList.toggle('show');
  });

  document.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => {
      const code = opt.dataset.value;
      const name = opt.textContent.trim();
      selectedLang.textContent = name;

      document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      langOptions.classList.remove('show');

      socket.emit('config_update', { target_lang: code });
    });
  });

  document.addEventListener('click', () => {
    langOptions.classList.remove('show');
  });

  // ── Reset button ──────────────────────────────────────────
  btnReset.addEventListener('click', resetView);

  // ── Init on load ──────────────────────────────────────────
  // No-op (Await speech)
</script>
</body>
</html>
